<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login — AMBR Consulting</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <a href="/" class="auth-logo-link">
      <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="AMBR Consulting" class="auth-logo" />
    </a>
    <h1>Client Login</h1>
    <p class="auth-subtitle">Access your client portal</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash--{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary btn-full">Log In</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </p>
    <p class="auth-footer">
      <a href="/">← Back to website</a>
    </p>
  </div>

</body>
</html>
