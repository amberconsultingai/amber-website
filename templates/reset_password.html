<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Amber Consulting</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <a href="/" class="auth-logo-link">
      <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Amber Consulting" class="auth-logo" />
    </a>
    <h1>Reset Password</h1>
    <p class="auth-subtitle">Choose a new password for your account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash--{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autofocus />
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary btn-full">Update Password</button>
    </form>
  </div>

</body>
</html>
