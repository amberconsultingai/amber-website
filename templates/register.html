<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Amber Consulting</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <a href="/" class="auth-logo-link">
      <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Amber Consulting" class="auth-logo" />
    </a>
    <h1>Create Account</h1>
    <p class="auth-subtitle">Set up your client portal access</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash--{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required autofocus />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required />
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="/login">Log in</a>
    </p>
    <p class="auth-footer">
      <a href="/">← Back to website</a>
    </p>
  </div>

</body>
</html>
